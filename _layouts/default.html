<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — Henry Pan</title>
  <link rel="icon" type="image/png" href="https://i.imgur.com/LTPgya5.png">
  <link rel="apple-touch-icon" type="image/png" href="https://i.imgur.com/LTPgya5.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      background: #050507;
      color: #E8E8EC;
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
    }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }
    ::selection { background: #D4A574; color: #050507; }

    /* ===== NAVIGATION ===== */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: rgba(5,5,7,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 1000;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .nav-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 1.25rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      color: #E8E8EC;
      transition: color 0.3s;
    }
    .nav-logo:hover { color: #D4A574; }
    .nav-links {
      display: flex;
      gap: 2.25rem;
      align-items: center;
    }
    .nav-links a {
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(232,232,236,0.4);
      transition: color 0.3s;
    }
    .nav-links a:hover { color: #D4A574; }
    .nav-links a.active { color: #E8E8EC; }

    /* Hamburger */
    .menu-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 5px;
    }
    .menu-toggle span {
      width: 22px;
      height: 1.5px;
      background: #E8E8EC;
      transition: all 0.3s;
    }

    /* Mobile overlay */
    .mobile-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #050507;
      z-index: 2000;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
    }
    .mobile-overlay.open {
      display: flex;
    }
    .mobile-overlay a {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 5vw, 2.5rem);
      font-weight: 400;
      color: rgba(232,232,236,0.6);
      padding: 0.5rem 0;
      transition: color 0.3s;
    }
    .mobile-overlay a:hover { color: #D4A574; }
    .mobile-close {
      position: absolute;
      top: 1.25rem; right: 2rem;
      font-size: 1.8rem;
      color: rgba(232,232,236,0.5);
      cursor: pointer;
      background: none;
      border: none;
      transition: color 0.3s;
    }
    .mobile-close:hover { color: #E8E8EC; }

    /* ===== CONTENT ===== */
    .content {
      max-width: 800px;
      margin: 0 auto;
      padding: 10rem 2rem 6rem;
      min-height: 80vh;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.15s forwards;
    }

    .content h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 6vw, 3.5rem);
      font-weight: 400;
      margin-bottom: 3rem;
      letter-spacing: -0.01em;
      color: #E8E8EC;
    }

    .content p {
      font-size: 1.05rem;
      line-height: 1.9;
      margin-bottom: 1.5rem;
      color: rgba(232,232,236,0.75);
    }

    .content em { color: rgba(232,232,236,0.9); }
    .content strong { color: #E8E8EC; font-weight: 500; }

    /* Back link */
    .back-link {
      display: inline-block;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #D4A574;
      margin-bottom: 3rem;
      transition: color 0.3s;
    }
    .back-link:hover { color: #E8E8EC; }

    /* Date */
    .date {
      font-size: 0.8rem;
      color: rgba(232,232,236,0.35);
      letter-spacing: 0.05em;
      margin-bottom: 3rem;
    }

    /* Listing items (writings, thoughts) */
    .listing-item {
      padding-bottom: 2.5rem;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .listing-item:last-child {
      border-bottom: none;
    }
    .listing-date {
      font-size: 0.8rem;
      color: rgba(232,232,236,0.3);
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
    }
    .listing-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-weight: 400;
      margin-bottom: 0.5rem;
    }
    .listing-title a {
      color: #E8E8EC;
      transition: color 0.3s;
    }
    .listing-title a:hover { color: #D4A574; }
    .listing-excerpt {
      font-size: 1rem;
      line-height: 1.8;
      color: rgba(232,232,236,0.5);
    }

    /* Recommendation items */
    .rec-item {
      margin-bottom: 3rem;
    }
    .rec-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 400;
      margin-bottom: 0.75rem;
      color: #E8E8EC;
    }
    .rec-note {
      font-size: 1rem;
      line-height: 1.8;
      color: rgba(232,232,236,0.55);
    }

    /* Essay/poem text */
    .essay-text {
      font-size: 1.1rem;
      line-height: 2;
      color: rgba(232,232,236,0.8);
      white-space: pre-line;
    }
    .essay-text p {
      color: rgba(232,232,236,0.8);
      margin-bottom: 1.5rem;
    }
    .essay-text i, .essay-text em {
      color: rgba(232,232,236,0.9);
    }
    .poem-text {
      font-size: 1.1rem;
      line-height: 2;
      color: rgba(232,232,236,0.8);
      white-space: pre-line;
    }
    .poem-text i, .poem-text em {
      color: rgba(232,232,236,0.9);
    }

    /* Coming soon */
    .coming-soon {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 8rem 2rem 4rem;
    }
    .coming-soon h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 6vw, 3.5rem);
      font-weight: 400;
      margin-bottom: 1.5rem;
      color: #E8E8EC;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.2s forwards;
    }
    .coming-soon p {
      font-size: 1.1rem;
      color: rgba(232,232,236,0.6);
      max-width: 500px;
      line-height: 1.8;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.35s forwards;
    }
    .coming-soon .cta-link {
      display: inline-block;
      padding: 14px 40px;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #050507;
      background: #D4A574;
      border-radius: 0;
      transition: background 0.3s, transform 0.3s;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.5s forwards;
    }
    .coming-soon .cta-link:hover {
      background: #E8E8EC;
      transform: translateY(-2px);
    }

    /* ===== FOOTER ===== */
    .site-footer {
      padding: 3rem 2rem;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    .footer-content {
      max-width: 1000px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-copy {
      font-size: 0.8rem;
      color: rgba(232,232,236,0.25);
    }
    .footer-links {
      display: flex;
      gap: 1.5rem;
    }
    .footer-links a {
      font-size: 0.8rem;
      color: rgba(232,232,236,0.25);
      transition: color 0.3s;
    }
    .footer-links a:hover { color: #D4A574; }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .menu-toggle { display: flex; }
      .content { padding: 8rem 1.5rem 4rem; }
      .footer-content {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <div class="nav-container">
      <a href="/" class="nav-logo">Henry Pan</a>
      <div class="nav-links">
        <a href="/about">About</a>
        <a href="/thoughts">Thoughts</a>
        <a href="/writings">Writings</a>
        <a href="/recommendations">Reading</a>
        <a href="/coaching">Coaching</a>
      </div>
      <div class="menu-toggle" id="menuToggle">
        <span></span>
        <span></span>
      </div>
    </div>
  </nav>

  <!-- Mobile Menu Overlay -->
  <div class="mobile-overlay" id="mobileOverlay">
    <button class="mobile-close" id="mobileClose">&times;</button>
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/thoughts">Thoughts</a>
    <a href="/writings">Writings</a>
    <a href="/recommendations">Reading</a>
    <a href="/coaching">Coaching</a>
  </div>

  {{ content }}

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-content">
      <div class="footer-copy">Henry Pan &copy; 2026</div>
      <div class="footer-links">
        <a href="https://instagram.com/henrybpan" target="_blank" rel="noopener">Instagram</a>
        <a href="https://tiktok.com/@henrybpan" target="_blank" rel="noopener">TikTok</a>
        <a href="https://linkedin.com/in/henrybpan" target="_blank" rel="noopener">LinkedIn</a>
        <a href="https://x.com/henrypanonx" target="_blank" rel="noopener">X</a>
      </div>
    </div>
  </footer>

  <script>
    // Mobile menu
    document.getElementById('menuToggle').addEventListener('click', function() {
      document.getElementById('mobileOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    });
    document.getElementById('mobileClose').addEventListener('click', function() {
      document.getElementById('mobileOverlay').classList.remove('open');
      document.body.style.overflow = '';
    });
    document.querySelectorAll('.mobile-overlay a').forEach(function(a) {
      a.addEventListener('click', function() {
        document.getElementById('mobileOverlay').classList.remove('open');
        document.body.style.overflow = '';
      });
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        document.getElementById('mobileOverlay').classList.remove('open');
        document.body.style.overflow = '';
      }
    });
  </script>
</body>
</html>
