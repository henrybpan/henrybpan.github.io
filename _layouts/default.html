<!--
  _layouts/default.html
  =====================
  Shared layout for all inner pages (essays, thoughts, recommendations, work-with-me).
  NOT used by index.html (homepage has its own standalone design).

  Sections: header, nav overlay, [page content], footer
  Fonts: Cormorant Garamond (display) + EB Garamond (body) from Google Fonts
  Colors: see CSS variables in :root
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — Henry Pan</title>
  <meta name="description" content="I help Christian entrepreneurs grow their businesses through personal brands that actually reflect who they are.">
  <link rel="icon" type="image/png" href="https://i.imgur.com/LTPgya5.png">
  <link rel="apple-touch-icon" type="image/png" href="https://i.imgur.com/LTPgya5.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>

    /* === RESET & BASE === */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      background: var(--white);
      color: var(--black);
      font-family: 'EB Garamond', serif;
      line-height: 1.6;
      overflow-x: hidden;
    }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }
    ::selection { background: var(--gold); color: var(--black); }

    /* === CSS VARIABLES === */
    :root {
      --white: #F5F2ED;
      --black: #0C0C0C;
      --muted: #888880;
      --gold:  #D4A574;
      --blue:  #C1C8D4;
      --card:  #EDEAE4;
      --rule:  rgba(12,12,12,0.12);
    }

    /* === HEADER === */
    .site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 500;
      background: var(--white);
      border-bottom: 1px solid var(--rule);
      padding: 1.35rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      text-decoration: none;
      color: var(--black);
    }
    /* Logo image — 26x26 circle */
    .header-logo img {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }
    /* Fallback circle if logo.png is missing */
    .logo-placeholder {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--black);
      flex-shrink: 0;
    }
    .header-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* === HAMBURGER === */
    .hamburger {
      width: 22px;
      height: 16px;
      position: relative;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      z-index: 600;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: var(--black);
      transition: all 0.3s ease;
      transform-origin: center;
    }
    /* Animate bars → X when open */
    .hamburger.open span:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }
    .hamburger.open span:nth-child(2) {
      transform: translateY(-7px) rotate(-45deg);
    }

    /* === NAV OVERLAY === */
    .nav-overlay {
      position: fixed;
      inset: 0;
      background: var(--white);
      z-index: 400;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .nav-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .nav-overlay a {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 5.5vw, 3rem);
      font-weight: 400;
      color: var(--muted);
      padding: 0.4rem 0;
      position: relative;
      transition: color 0.3s ease;
    }
    /* Gold underline from left on hover */
    .nav-overlay a::after {
      content: '';
      position: absolute;
      bottom: 0.2rem;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--gold);
      transition: width 0.3s ease;
    }
    .nav-overlay a:hover { color: var(--black); }
    .nav-overlay a:hover::after { width: 100%; }

    /* === CONTENT === */
    .content {
      max-width: 720px;
      margin: 0 auto;
      padding: 9rem 2rem 5rem;
      min-height: 80vh;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.15s forwards;
    }
    .content h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      margin-bottom: 0.5rem;
      letter-spacing: -0.01em;
      color: var(--black);
    }
    .content p {
      font-family: 'EB Garamond', serif;
      font-size: 1.1rem;
      line-height: 1.9;
      margin-bottom: 1.5rem;
      color: var(--black);
    }
    .content em { font-style: italic; }
    .content strong { font-weight: 500; }

    /* Back link on essay pages */
    .back-link {
      display: inline-block;
      font-family: 'EB Garamond', serif;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      color: var(--gold);
      margin-bottom: 2.5rem;
      transition: color 0.3s;
    }
    .back-link:hover { color: var(--black); }

    /* Date line on essay pages */
    .date {
      font-family: 'EB Garamond', serif;
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 3rem;
    }

    /* Essay body text */
    .essay-text {
      font-family: 'EB Garamond', serif;
      font-size: 1.1rem;
      line-height: 2;
      color: var(--black);
    }
    .essay-text p { margin-bottom: 1.5rem; }
    .essay-text i, .essay-text em { font-style: italic; }

    /* Poem body text */
    .poem-text {
      font-family: 'EB Garamond', serif;
      font-size: 1.1rem;
      line-height: 2;
      color: var(--black);
      white-space: pre-line;
    }
    .poem-text i, .poem-text em { font-style: italic; }

    /* Listing items (essays, thoughts) */
    .listing-item {
      padding-bottom: 2.5rem;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--rule);
    }
    .listing-item:last-child { border-bottom: none; }
    .listing-date {
      font-family: 'EB Garamond', serif;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .listing-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-weight: 400;
      margin-bottom: 0.5rem;
    }
    .listing-title a {
      color: var(--black);
      transition: color 0.3s;
    }
    .listing-title a:hover { color: var(--gold); }
    .listing-excerpt {
      font-family: 'EB Garamond', serif;
      font-size: 1rem;
      line-height: 1.8;
      color: var(--muted);
    }

    /* Page heading used on listing pages */
    .page-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 5vw, 2.75rem);
      font-weight: 400;
      margin-bottom: 3rem;
      color: var(--black);
    }

    /* === FOOTER === */
    .site-footer {
      border-top: 1px solid var(--rule);
      padding: 1.5rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .footer-copy {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .footer-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.2rem;
    }
    .footer-email {
      font-family: 'EB Garamond', serif;
      font-size: 0.78rem;
      color: var(--muted);
      transition: color 0.3s;
    }
    .footer-email:hover { color: var(--gold); }
    .footer-location {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* === ANIMATIONS === */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* === RESPONSIVE === */
    @media (max-width: 600px) {
      .site-header { padding: 1rem 1.25rem; }
      .site-footer { padding: 1.25rem; flex-direction: column; gap: 0.75rem; align-items: flex-start; }
      .footer-right { align-items: flex-start; }
      .content { padding: 7rem 1.25rem 4rem; }
    }

  </style>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <a href="/" class="header-logo">
      <!-- Logo image. Falls back to placeholder div if file missing. -->
      <img src="https://i.imgur.com/LTPgya5.png" alt="Henry Pan logo"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
      <div class="logo-placeholder" style="display:none;"></div>
      <span class="header-name">Henry Pan</span>
    </a>
    <button class="hamburger" id="hamburger" aria-label="Toggle navigation" aria-expanded="false">
      <span></span>
      <span></span>
    </button>
  </header>

  <!-- ===== NAV OVERLAY ===== -->
  <nav class="nav-overlay" id="navOverlay" aria-label="Main navigation">
    <a href="/essays/">Essays</a>
    <a href="/thoughts/">Thoughts</a>
    <a href="/recommendations/">Recommendations</a>
    <a href="/work-with-me/">Work With Me</a>
  </nav>

  <!-- ===== PAGE CONTENT ===== -->
  {{ content }}

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <div class="footer-copy">&copy; 2026 Henry Pan</div>
    <div class="footer-right">
      <a href="mailto:work@henrybpan.com" class="footer-email">work@henrybpan.com</a>
      <span class="footer-location">NoVA | University of Virginia</span>
    </div>
  </footer>

  <!-- ===== HAMBURGER JS ===== -->
  <script>
    (function () {
      'use strict';

      var hamburger = document.getElementById('hamburger');
      var overlay   = document.getElementById('navOverlay');

      // Open/close the nav overlay and toggle hamburger animation
      function openNav() {
        hamburger.classList.add('open');
        overlay.classList.add('open');
        document.body.style.overflow = 'hidden';
        hamburger.setAttribute('aria-expanded', 'true');
      }
      function closeNav() {
        hamburger.classList.remove('open');
        overlay.classList.remove('open');
        document.body.style.overflow = '';
        hamburger.setAttribute('aria-expanded', 'false');
      }

      // Toggle on hamburger click
      hamburger.addEventListener('click', function () {
        overlay.classList.contains('open') ? closeNav() : openNav();
      });

      // Close when any nav link is clicked
      overlay.querySelectorAll('a').forEach(function (link) {
        link.addEventListener('click', closeNav);
      });

      // Close on Escape key
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeNav();
      });
    }());
  </script>

</body>
</html>
