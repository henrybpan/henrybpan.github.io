<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <meta http-equiv="refresh" content="0; url=/director">
  <link rel="canonical" href="https://henrybpan.com/director">
  <title>Redirecting… — Henry Pan</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #fff;
      color: #1a1915;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 1.05rem;
      line-height: 1.7;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .msg { max-width: 420px; text-align: center; color: #666; }
    .msg a {
      color: #1a1915;
      text-decoration: underline;
      text-decoration-color: #ccc;
      text-underline-offset: 3px;
    }
    .msg a:hover { text-decoration-color: #1a1915; }
  </style>
  <script>window.location.replace('/director');</script>
</head>
<body>
  <div class="msg">
    Moved to <a href="/director">/director</a>.
  </div>
</body>
</html>
