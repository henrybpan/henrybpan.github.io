<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work with Me — Henry Pan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }

    body {
      background: #fff;
      color: #1a1915;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(1rem, 1.8vw, 1.125rem);
      line-height: 1.7;
      min-height: 100dvh;
    }

    .page {
      max-width: 580px;
      margin: 0 auto;
      padding: clamp(2.5rem, 8vw, 5rem) clamp(1.5rem, 6vw, 2rem);
    }

    .back {
      display: inline-block;
      font-size: 0.8rem;
      color: #999;
      text-decoration: none;
      margin-bottom: 2.8rem;
      letter-spacing: 0.01em;
    }

    .back:hover { color: #1a1915; }

    h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 500;
      letter-spacing: 0.01em;
      margin-bottom: 1.5rem;
      line-height: 1.2;
    }

    .notice {
      font-style: italic;
      color: #666;
      margin-bottom: 1.5rem;
    }

    .body-copy p + p {
      margin-top: 1.1em;
    }

    .body-copy a {
      color: #1a1915;
      text-decoration: underline;
      text-decoration-color: #ccc;
      text-underline-offset: 3px;
      transition: text-decoration-color 0.15s ease;
    }

    .body-copy a:hover {
      text-decoration-color: #1a1915;
    }

    @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
  </style>
</head>
<body>
  <main class="page">
    <a href="/" class="back">&#8592; Back</a>
    <h1>Work with Me</h1>
    <p class="notice">I am currently not accepting new clients.</p>
    <div class="body-copy">
      <p>If you know me personally and want to work together, DM me on <a href="https://www.instagram.com/henrybpan" target="_blank" rel="noopener noreferrer">Instagram</a>.</p>
      <p>If you are a brand, email <a href="mailto:work@henrybpan.com">work@henrybpan.com</a>.</p>
    </div>
  </main>
</body>
</html>
