<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work with Me — Henry Pan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    body {
      background-color: #0F0E0C;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .page {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: clamp(2.5rem, 8vw, 4.5rem) clamp(2rem, 10vw, 5rem);
      animation: up 0.75s cubic-bezier(0.16, 1, 0.3, 1) both;
      max-width: 680px;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    .back {
      display: inline-block;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(237, 232, 222, 0.22);
      text-decoration: none;
      margin-bottom: clamp(3rem, 8vh, 5rem);
      transition: color 0.2s ease;
    }

    .back:hover { color: rgba(237, 232, 222, 0.5); }

    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: clamp(2.2rem, 7vw, 3.5rem);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(237, 232, 222, 0.28);
      line-height: 1;
      margin-bottom: clamp(2rem, 5vh, 3rem);
    }

    .notice {
      font-family: 'EB Garamond', Georgia, serif;
      font-style: italic;
      font-size: clamp(0.95rem, 2.2vw, 1.1rem);
      color: rgba(237, 232, 222, 0.30);
      margin-bottom: clamp(1.8rem, 4vh, 2.5rem);
      line-height: 1.6;
    }

    .body-copy {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(1rem, 2.4vw, 1.15rem);
      color: rgba(237, 232, 222, 0.42);
      line-height: 1.75;
    }

    .body-copy p + p {
      margin-top: 1.1em;
    }

    .body-copy a {
      color: rgba(237, 232, 222, 0.55);
      text-decoration: none;
      border-bottom: 0.5px solid rgba(237, 232, 222, 0.22);
      transition: color 0.2s ease, border-color 0.2s ease;
    }

    .body-copy a:hover {
      color: rgba(237, 232, 222, 0.85);
      border-color: rgba(237, 232, 222, 0.5);
    }

    @media (prefers-reduced-motion: reduce) { .page { animation: none; } }
  </style>
</head>
<body>
  <main class="page">
    <a href="/" class="back">&#8592; Back</a>
    <h1>Work with Me</h1>
    <p class="notice">I am currently not accepting new clients.</p>
    <div class="body-copy">
      <p>If you know me personally and want to work together, DM me on <a href="https://www.instagram.com/henrybpan" target="_blank" rel="noopener noreferrer">Instagram</a>.</p>
      <p>If you are a brand, email <a href="mailto:work@henrybpan.com">work@henrybpan.com</a>.</p>
    </div>
  </main>
</body>
</html>
