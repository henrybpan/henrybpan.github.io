<!DOCTYPE html>
<html lang="en">
<head>
  <script>(function(){try{var t=localStorage.getItem('theme');if(!t)t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.dataset.theme=t;}catch(e){document.documentElement.dataset.theme='light';}}());</script>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Essays — Henry Pan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/theme.css">
  <script src="/assets/theme.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(1rem, 1.8vw, 1.125rem);
      line-height: 1.7;
      min-height: 100dvh;
    }

    .page {
      max-width: 580px;
      margin: 0 auto;
      padding: clamp(2.5rem, 8vw, 5rem) clamp(1.5rem, 6vw, 2rem);
    }

    .back {
      display: inline-block;
      font-size: 0.8rem;
      color: var(--fg-dim);
      text-decoration: none;
      margin-bottom: 2.8rem;
      letter-spacing: 0.01em;
    }

    .back:hover { color: var(--fg); }

    h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 500;
      letter-spacing: 0.01em;
      margin-bottom: 2rem;
      line-height: 1.2;
    }

    /* Essay list */
    .essay-list {
      list-style: none;
      margin-bottom: 3.5rem;
    }

    .essay-list li + li {
      margin-top: 0.25rem;
    }

    .essay-list a {
      color: var(--fg);
      text-decoration: underline;
      text-decoration-color: var(--border-strong);
      text-underline-offset: 3px;
      transition: text-decoration-color 0.15s ease;
    }

    .essay-list a:hover {
      text-decoration-color: var(--fg);
    }

    .essay-meta {
      color: var(--fg-dim);
      font-size: 0.875rem;
      margin-left: 0.6em;
    }

    .empty {
      color: var(--fg-faint);
      font-style: italic;
    }

    /* Email CTA */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5rem 0;
    }

    .email-cta p {
      color: var(--fg-mut);
      margin-bottom: 0.5rem;
    }

    .email-cta a {
      color: var(--fg);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .email-cta a:hover { color: var(--fg-mut); }

    @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
  </style>
</head>
<body>
  <button type="button" class="theme-toggle" aria-label="Toggle light or dark mode">
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
  </button>
  <div class="page">
    <a href="/" class="back">&#8592; Henry Pan</a>

    <h1>Essays</h1>

    <ul class="essay-list">
      <!-- Add essays here as:
      <li><a href="/essays/essay-slug">Essay Title</a> <span class="essay-meta">Month Year</span></li>
      -->
      <li><span class="empty">Nothing published yet.</span></li>
    </ul>

    <hr class="divider">

    <div class="email-cta">
      <p>Get new essays in your inbox.</p>
      <a href="https://henrybpan.substack.com/" target="_blank" rel="noopener noreferrer">Subscribe on Substack &rarr;</a>
    </div>
  </div>
</body>
</html>
