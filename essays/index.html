<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Essays — Henry Pan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }

    body {
      background: #fff;
      color: #1a1915;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(1rem, 1.8vw, 1.125rem);
      line-height: 1.7;
      min-height: 100dvh;
    }

    .page {
      max-width: 580px;
      margin: 0 auto;
      padding: clamp(2.5rem, 8vw, 5rem) clamp(1.5rem, 6vw, 2rem);
    }

    .back {
      display: inline-block;
      font-size: 0.8rem;
      color: #999;
      text-decoration: none;
      margin-bottom: 2.8rem;
      letter-spacing: 0.01em;
    }

    .back:hover { color: #1a1915; }

    h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 500;
      letter-spacing: 0.01em;
      margin-bottom: 2rem;
      line-height: 1.2;
    }

    /* Essay list */
    .essay-list {
      list-style: none;
      margin-bottom: 3.5rem;
    }

    .essay-list li + li {
      margin-top: 0.25rem;
    }

    .essay-list a {
      color: #1a1915;
      text-decoration: underline;
      text-decoration-color: #ccc;
      text-underline-offset: 3px;
      transition: text-decoration-color 0.15s ease;
    }

    .essay-list a:hover {
      text-decoration-color: #1a1915;
    }

    .essay-meta {
      color: #999;
      font-size: 0.875rem;
      margin-left: 0.6em;
    }

    .empty {
      color: #aaa;
      font-style: italic;
    }

    /* Email CTA */
    .divider {
      border: none;
      border-top: 1px solid #e8e8e8;
      margin: 2.5rem 0;
    }

    .email-cta p {
      color: #666;
      margin-bottom: 0.5rem;
    }

    .email-cta a {
      color: #1a1915;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .email-cta a:hover { color: #555; }

    @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
  </style>
</head>
<body>
  <div class="page">
    <a href="/" class="back">&#8592; Henry Pan</a>

    <h1>Essays</h1>

    <ul class="essay-list">
      <!-- Add essays here as:
      <li><a href="/essays/essay-slug">Essay Title</a> <span class="essay-meta">Month Year</span></li>
      -->
      <li><span class="empty">Nothing published yet.</span></li>
    </ul>

    <hr class="divider">

    <div class="email-cta">
      <p>Get new essays in your inbox.</p>
      <a href="https://henrybpan.substack.com/" target="_blank" rel="noopener noreferrer">Subscribe on Substack &rarr;</a>
    </div>
  </div>
</body>
</html>
