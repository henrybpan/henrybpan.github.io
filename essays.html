---
layout: default
title: Essays
---
<!--
  essays.html
  ===========
  Lists all essays from _data/essays.json.
  Essays are ordered newest-first in the JSON file.
  Each entry links to /essays/[slug]/.
-->

<section class="content">
  <h1 class="page-heading">Essays</h1>

  <p style="margin-bottom: 2.5rem; font-size: 1rem; color: var(--muted);">
    Subscribe to my <a href="https://henrybpan.substack.com/" target="_blank" rel="noopener" style="color: var(--gold); border-bottom: 1px solid var(--gold);">Substack</a> for new essays.
  </p>

  {% for essay in site.data.essays %}
  <div class="listing-item">
    <div class="listing-date">{{ essay.date }}</div>
    <h3 class="listing-title">
      {% if essay.substack_url %}
      <a href="{{ essay.substack_url }}" target="_blank" rel="noopener">{{ essay.title }}</a>
      {% else %}
      <a href="/essays/{{ essay.slug }}/">{{ essay.title }}</a>
      {% endif %}
    </h3>
    <p class="listing-excerpt">{{ essay.excerpt }}</p>
  </div>
  {% endfor %}
</section>
