---
layout: default
title: Thoughts
---
<!--
  thoughts.html
  =============
  Lists all thoughts from _data/thoughts.json.
  Thoughts are ordered newest-first in the JSON file.
  No titles, no audio, no play buttons — just dated text.
  Date format: 'Month Dth, Year' with ordinal suffix.
-->

<section class="content">
  <h1 class="page-heading">Thoughts</h1>

  {% for thought in site.data.thoughts %}
  <div class="listing-item">
    <div class="listing-date">{{ thought.date }}</div>
    <p class="listing-excerpt" style="white-space: pre-line;">{{ thought.text }}</p>
  </div>
  {% endfor %}
</section>
