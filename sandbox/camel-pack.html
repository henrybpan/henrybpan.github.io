<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Camel Blue — frame study</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Cormorant+SC:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a3a8f;
    --navy-ink: #142d6e;
    --cream: #f8f1de;
    --gold: #b97c3a;
    --gold-light: #d8a05a;
    --sand: #e8c98a;
  }
  html, body { margin: 0; }
  body {
    font-family: 'Cormorant Garamond', 'Times New Roman', serif;
    background:
      radial-gradient(ellipse at center, #2c2c2c 0%, #0a0a0a 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  /* === Pack === */
  .pack {
    width: min(420px, 92vw);
    aspect-ratio: 360 / 580;
    position: relative;
    filter: drop-shadow(0 30px 40px rgba(0,0,0,0.6))
            drop-shadow(0 0 1px rgba(0,0,0,0.6));
  }
  .pack-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* HTML content overlay — coordinates expressed as % to scale with the pack */
  .pack-content {
    position: absolute;
    inset: 0;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: var(--navy);
  }

  /* SINCE 1913 banner crosses the navy/cream boundary */
  .banner {
    position: absolute;
    top: 1.6%;
    left: 50%;
    transform: translateX(-50%);
    background: var(--navy);
    color: var(--cream);
    font-family: 'Cormorant SC', 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: clamp(0.55rem, 1.6vw, 0.78rem);
    letter-spacing: 0.42em;
    padding: 0.4em 1.6em 0.45em;
    border-radius: 3px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18);
    z-index: 3;
  }

  .logo-block {
    margin-top: 12%;
    text-align: center;
    width: 100%;
  }
  .logo-camel {
    font-family: 'Cormorant SC', 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: clamp(2.4rem, 9vw, 3.8rem);
    color: var(--navy);
    letter-spacing: 0.04em;
    line-height: 0.95;
    text-shadow:
      0 -1px 0 rgba(255,255,255,0.4),
      0 1px 0 rgba(0,0,0,0.15);
  }
  .logo-blue {
    font-family: 'Cormorant SC', 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: clamp(0.95rem, 3.2vw, 1.5rem);
    color: var(--navy);
    letter-spacing: 0.6em;
    margin-top: 0.35em;
    text-indent: 0.6em;
  }

  .camel-art {
    width: 84%;
    margin: 6% auto 0;
  }
  .camel-art svg { width: 100%; height: auto; display: block; }

  .footer {
    position: absolute;
    bottom: 5%;
    left: 0;
    right: 0;
    text-align: center;
    color: var(--navy);
  }
  .footer-main {
    font-family: 'Cormorant SC', 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: clamp(0.78rem, 2.4vw, 1.05rem);
    letter-spacing: 0.34em;
    text-indent: 0.34em;
  }
  .footer-sub {
    font-family: 'Cormorant SC', 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: clamp(0.66rem, 1.9vw, 0.9rem);
    letter-spacing: 0.55em;
    text-indent: 0.55em;
    margin-top: 0.3em;
  }
</style>
</head>
<body>

<div class="pack">

  <!--
    Single SVG draws the entire pack:
      1. Navy outer rectangle (sharp 90° corners)
      2. Cream inner panel with STEPPED top corners (2 treads + 3 micro-arcs each)
         and simple rounded bottom corners
    viewBox 360 × 580; lip ("padding") = 14 units on each side
    Stepped corner zone = 16 × 16 units, occupying (W-30..W-14, 14..30) at top-right
    Each step uses radius 3, tread 4 — yields 2 visible treads with 3 small arcs
  -->
  <svg class="pack-svg" viewBox="0 0 360 580" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
    <!-- Outer navy field -->
    <rect x="0" y="0" width="360" height="580" fill="#1a3a8f"/>

    <!-- Subtle navy texture (thin gradient sheen for depth) -->
    <defs>
      <linearGradient id="navySheen" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#1a3a8f"/>
        <stop offset="50%" stop-color="#214394"/>
        <stop offset="100%" stop-color="#16306d"/>
      </linearGradient>
      <linearGradient id="creamGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#fbf6e6"/>
        <stop offset="100%" stop-color="#f3ebd2"/>
      </linearGradient>
      <linearGradient id="sandGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#fbf6e6"/>
        <stop offset="55%" stop-color="#f5e8c4"/>
        <stop offset="100%" stop-color="#e8c98a"/>
      </linearGradient>
    </defs>
    <rect x="0" y="0" width="360" height="580" fill="url(#navySheen)" opacity="0.55"/>

    <!--
      Inner panel path (clockwise from top-left stepped corner):

      Top-left stepped:      go from left edge up into top edge via 3 small arcs + 2 short treads
      Top edge:              long horizontal
      Top-right stepped:     mirror — 3 small arcs + 2 short treads down into right edge
      Right edge:            long vertical
      Bottom-right rounded:  single arc r=8
      Bottom edge:           long horizontal
      Bottom-left rounded:   single arc r=8
      Left edge:             long vertical
      Close
    -->
    <path d="
      M 30 14
      L 330 14
      a 3 3 0 0 1 3 3
      L 337 17
      a 3 3 0 0 1 3 3
      L 343 20
      a 3 3 0 0 1 3 3
      L 346 23
      L 346 557
      a 3 3 0 0 1 -3 3
      L 340 560
      a 3 3 0 0 1 -3 3
      L 333 563
      a 3 3 0 0 1 -3 3
      L 30 566
      a 3 3 0 0 1 -3 -3
      L 23 563
      a 3 3 0 0 1 -3 -3
      L 17 560
      a 3 3 0 0 1 -3 -3
      L 14 557
      L 14 23
      a 3 3 0 0 1 3 -3
      L 20 20
      a 3 3 0 0 1 3 -3
      L 26 17
      a 3 3 0 0 1 3 -3
      Z
    " fill="url(#sandGrad)" stroke="#1a3a8f" stroke-width="0.9" stroke-linejoin="round"/>

    <!-- Inner thin navy hairline ring sitting just inside the panel edge for that "printed seam" -->
    <path d="
      M 31 16
      L 329 16
      a 3 3 0 0 1 3 3
      L 336 19
      a 3 3 0 0 1 3 3
      L 342 22
      a 3 3 0 0 1 3 3
      L 344 25
      L 344 555
      a 3 3 0 0 1 -3 3
      L 339 558
      a 3 3 0 0 1 -3 3
      L 332 561
      a 3 3 0 0 1 -3 3
      L 31 564
      a 3 3 0 0 1 -3 -3
      L 24 561
      a 3 3 0 0 1 -3 -3
      L 18 558
      a 3 3 0 0 1 -3 -3
      L 16 555
      L 16 25
      a 3 3 0 0 1 3 -3
      L 21 22
      a 3 3 0 0 1 3 -3
      L 27 19
      a 3 3 0 0 1 3 -3
      Z
    " fill="none" stroke="#1a3a8f" stroke-width="0.5" stroke-linejoin="round" opacity="0.5"/>
  </svg>

  <!-- HTML overlay content -->
  <div class="pack-content">
    <div class="banner">SINCE 1913</div>

    <div class="logo-block">
      <div class="logo-camel">CAMEL</div>
      <div class="logo-blue">BLUE</div>
    </div>

    <div class="camel-art">
      <svg viewBox="0 0 200 120" aria-hidden="true">
        <!-- Distant pyramids -->
        <g fill="#d8a05a" opacity="0.85">
          <path d="M 150 100 L 168 72 L 186 100 Z"/>
          <path d="M 172 100 L 186 80 L 198 100 Z"/>
          <path d="M 14 100 L 26 84 L 38 100 Z" opacity="0.6"/>
        </g>

        <!-- Palm trees (left) -->
        <g stroke="#8a5a28" fill="none" stroke-linecap="round">
          <line x1="22" y1="100" x2="22" y2="78" stroke-width="1.2"/>
          <path d="M 22 78 q -8 -3 -12 -7 M 22 78 q 8 -3 12 -7 M 22 78 q -6 -6 -8 -10 M 22 78 q 6 -6 8 -10" stroke-width="1"/>
          <line x1="14" y1="100" x2="14" y2="86" stroke-width="0.9"/>
          <path d="M 14 86 q -5 -2 -7 -4 M 14 86 q 5 -2 7 -4 M 14 86 q -3 -4 -4 -6 M 14 86 q 3 -4 4 -6" stroke-width="0.8"/>
        </g>

        <!-- Camel — single-hump-forward, classic Camel pack silhouette -->
        <g fill="#b97c3a" stroke="#7a4a1c" stroke-width="0.4" stroke-linejoin="round">
          <!-- Body + back hump + neck + head as one form -->
          <path d="
            M 52 92
            Q 55 80 60 76
            Q 68 70 80 70
            Q 86 58 96 56
            Q 106 58 110 70
            Q 122 68 132 70
            Q 140 72 145 78
            Q 150 84 152 90
            L 150 95
            L 145 95
            L 145 102
            L 141 102
            L 141 96
            Q 132 100 116 100
            Q 100 102 86 100
            L 86 102
            L 82 102
            L 82 99
            Q 70 96 60 95
            L 56 102
            L 52 102
            L 52 95
            Z
          "/>
          <!-- Neck and head -->
          <path d="
            M 52 92
            Q 44 78 40 64
            Q 38 54 42 46
            Q 46 38 54 38
            L 60 42
            L 58 47
            L 56 50
            L 54 56
            L 52 64
            L 52 75
            Z
          "/>
          <!-- Ear -->
          <path d="M 48 38 L 46 32 L 52 36 Z"/>
          <!-- Mouth detail -->
          <path d="M 60 42 L 64 44 L 60 46 Z" fill="#7a4a1c"/>
          <!-- Tail -->
          <path d="M 52 90 Q 49 96 51 102 L 53 102 Q 54 96 55 92 Z"/>

          <!-- Texture spots (camel hair) -->
          <g fill="#7a4a1c" opacity="0.55">
            <circle cx="78" cy="80" r="1"/>
            <circle cx="84" cy="84" r="0.8"/>
            <circle cx="92" cy="78" r="1"/>
            <circle cx="100" cy="82" r="0.9"/>
            <circle cx="108" cy="80" r="1.1"/>
            <circle cx="116" cy="84" r="0.8"/>
            <circle cx="124" cy="80" r="1"/>
            <circle cx="132" cy="84" r="0.8"/>
            <circle cx="74" cy="86" r="0.7"/>
            <circle cx="88" cy="90" r="0.9"/>
            <circle cx="104" cy="92" r="0.8"/>
            <circle cx="120" cy="92" r="1"/>
            <circle cx="50" cy="60" r="0.7"/>
            <circle cx="48" cy="70" r="0.8"/>
          </g>
        </g>

        <!-- Ground / horizon -->
        <line x1="0" y1="103" x2="200" y2="103" stroke="#b97c3a" stroke-width="0.5" opacity="0.6"/>
      </svg>
    </div>

    <div class="footer">
      <div class="footer-main">TURKISH &amp; DOMESTIC</div>
      <div class="footer-sub">BLEND</div>
    </div>
  </div>

</div>

</body>
</html>
