<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=https://form.typeform.com/to/iNjNiJcH">
    <title>Redirecting...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #050507;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .container {
            text-align: center;
            color: #E8E8EC;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(212,165,116,0.2);
            border-top-color: #D4A574;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h1 {
            font-size: 18px;
            font-weight: 400;
            margin: 0 0 10px 0;
            letter-spacing: 0.05em;
        }
        p {
            font-size: 14px;
            color: rgba(232,232,236,0.5);
            margin: 0;
        }
        a {
            color: #D4A574;
            text-decoration: none;
        }
        a:hover { color: #E8E8EC; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Redirecting...</h1>
        <p>If you're not redirected automatically, <a href="https://form.typeform.com/to/iNjNiJcH">click here</a>.</p>
    </div>

    <script>
        setTimeout(function() {
            window.location.href = "https://form.typeform.com/to/iNjNiJcH";
        }, 100);
    </script>
</body>
</html>
