<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lindy Library — Henry Pan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    body {
      background-color: #0F0E0C;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .page {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: clamp(2.5rem, 8vw, 4.5rem) clamp(2rem, 10vw, 5rem);
      animation: up 0.75s cubic-bezier(0.16, 1, 0.3, 1) both;
      max-width: 680px;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    .back {
      display: inline-block;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(237, 232, 222, 0.48);
      text-decoration: none;
      margin-bottom: clamp(3rem, 8vh, 5rem);
      transition: color 0.2s ease;
    }

    .back:hover { color: rgba(237, 232, 222, 0.78); }

    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: clamp(2.2rem, 7vw, 3.5rem);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(237, 232, 222, 0.75);
      line-height: 1;
      margin-bottom: clamp(1rem, 2.5vh, 1.5rem);
    }

    .subtitle {
      font-family: 'EB Garamond', Georgia, serif;
      font-style: italic;
      font-size: clamp(0.95rem, 2.2vw, 1.05rem);
      color: rgba(237, 232, 222, 0.45);
      margin-bottom: clamp(3rem, 7vh, 4.5rem);
      line-height: 1.6;
    }

    .wip {
      margin-top: 1.4rem;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(237, 232, 222, 0.35);
    }

    /* Email CTA */
    .email-cta {
      margin-top: auto;
      padding-top: clamp(3rem, 8vh, 5rem);
      border-top: 0.5px solid rgba(237, 232, 222, 0.08);
    }

    .email-cta-label {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(237, 232, 222, 0.38);
      margin-bottom: 0.9rem;
    }

    .email-cta-link {
      display: inline-block;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: clamp(1.1rem, 2.8vw, 1.4rem);
      letter-spacing: 0.1em;
      color: rgba(237, 232, 222, 0.68);
      text-decoration: none;
      transition: color 0.2s ease;
      position: relative;
    }

    .email-cta-link::after {
      content: '';
      position: absolute;
      bottom: -0.15em;
      left: 0;
      width: 0;
      height: 0.5px;
      background: rgba(237, 232, 222, 0.45);
      transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .email-cta-link:hover { color: rgba(237, 232, 222, 0.9); }
    .email-cta-link:hover::after { width: 100%; }

    @media (prefers-reduced-motion: reduce) {
      .page { animation: none; }
      .email-cta-link::after { transition: none; }
    }
  </style>
</head>
<body>
  <main class="page">
    <a href="/" class="back">&#8592; Back</a>
    <h1>Lindy Library</h1>
    <p class="subtitle">Things that have stood the test of time.</p>
    <p class="wip">Work in Progress</p>

    <section class="email-cta">
      <p class="email-cta-label">Get new additions to the library</p>
      <a href="https://henrybpan.substack.com/" target="_blank" rel="noopener noreferrer" class="email-cta-link">Subscribe on Substack &rarr;</a>
    </section>
  </main>
</body>
</html>
