---
layout: default
title: Recommendations
---
<!--
  recommendations.html
  ====================
  Grid of recommendation cards from _data/recs.json.
  Filter bar: All / Books / Essays / Podcasts / Music (NO Films).
  Filtering is JS-powered (display:none toggle), no page reload.
  Thumbnail images go in /assets/images/recs/. Null image = placeholder.
-->

<style>
  /* === REC PAGE STYLES === */

  /* Filter bar */
  .filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 3rem;
  }
  .filter-btn {
    font-family: 'EB Garamond', serif;
    font-size: 0.9rem;
    color: var(--muted);
    background: none;
    border: 1px solid var(--rule);
    padding: 0.35rem 0.85rem;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
  }
  .filter-btn:hover { color: var(--black); border-color: var(--black); }
  .filter-btn.active {
    color: var(--black);
    border-color: var(--black);
    background: var(--card);
  }

  /* Rec grid */
  .rec-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1.5rem;
  }

  /* Individual card */
  .rec-card {
    background: var(--card);
    display: flex;
    flex-direction: column;
  }

  /* Square thumbnail */
  .rec-thumb {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    display: block;
  }

  /* Placeholder when no image: first letter of title */
  .thumb-placeholder {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--blue);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 3rem;
    font-weight: 300;
    color: var(--black);
    opacity: 0.6;
  }

  /* Card body */
  .rec-body {
    padding: 1rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }
  .rec-tag {
    font-family: 'EB Garamond', serif;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .rec-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    font-weight: 400;
    color: var(--black);
    line-height: 1.3;
  }
  .rec-author {
    font-family: 'EB Garamond', serif;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .rec-annotation {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 0.9rem;
    color: var(--muted);
    line-height: 1.6;
    margin-top: 0.4rem;
  }

  /* Hidden state for filtered-out cards */
  .rec-card.hidden { display: none; }

  /* Responsive: 2 columns on mobile */
  @media (max-width: 600px) {
    .rec-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
  }
</style>

<section class="content">
  <h1 class="page-heading">Recommendations</h1>

  <!-- Filter bar: All · Books · Essays · Podcasts · Music -->
  <div class="filter-bar" role="group" aria-label="Filter recommendations">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="books">Books</button>
    <button class="filter-btn" data-filter="essays">Essays</button>
    <button class="filter-btn" data-filter="podcasts">Podcasts</button>
    <button class="filter-btn" data-filter="music">Music</button>
  </div>

  <!-- Rec grid: rendered from _data/recs.json -->
  <div class="rec-grid" id="recGrid">
    {% for rec in site.data.recs %}
    <div class="rec-card" data-type="{{ rec.type }}">
      {% if rec.image %}
        <img class="rec-thumb" src="{{ rec.image }}" alt="{{ rec.title }}">
      {% else %}
        <div class="thumb-placeholder">{{ rec.title | slice: 0 }}</div>
      {% endif %}
      <div class="rec-body">
        <span class="rec-tag">{{ rec.tag }}</span>
        <div class="rec-title">{{ rec.title }}</div>
        <div class="rec-author">{{ rec.author }}</div>
        <p class="rec-annotation">{{ rec.annotation }}</p>
      </div>
    </div>
    {% endfor %}
  </div>
</section>

<script>
  (function () {
    'use strict';

    var buttons = document.querySelectorAll('.filter-btn');
    var cards   = document.querySelectorAll('.rec-card');

    // Filter cards by data-type attribute
    function applyFilter(filter) {
      cards.forEach(function (card) {
        if (filter === 'all' || card.dataset.type === filter) {
          card.classList.remove('hidden');
        } else {
          card.classList.add('hidden');
        }
      });
    }

    // Attach click handler to each filter button
    buttons.forEach(function (btn) {
      btn.addEventListener('click', function () {
        // Update active state
        buttons.forEach(function (b) { b.classList.remove('active'); });
        btn.classList.add('active');
        // Apply the selected filter
        applyFilter(btn.dataset.filter);
      });
    });
  }());
</script>
