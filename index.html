<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Henry Pan — Social Media Growth">
  <title>Henry Pan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>

    /* ============================================================
       RESET
    ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ============================================================
       BASE
    ============================================================ */
    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background-color: #0F0E0C;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Cinematic vignette — draws focus to the card */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(
        ellipse 75% 75% at 50% 50%,
        transparent 30%,
        rgba(0, 0, 0, 0.5) 100%
      );
      pointer-events: none;
      z-index: 0;
    }

    /* ============================================================
       SCENE
    ============================================================ */
    .scene {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      animation: sceneEntry 1.1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes sceneEntry {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* ============================================================
       CARD SCENE  (perspective wrapper + tap target)
    ============================================================ */
    .card-scene {
      width: min(520px, 88vw);
      aspect-ratio: 1.75;
      perspective: 1400px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    .card-scene:focus-visible {
      outline: 1.5px solid rgba(237, 232, 222, 0.22);
      outline-offset: 10px;
      border-radius: 3px;
    }

    /* ============================================================
       CARD INNER  (3D flip container)
    ============================================================ */
    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 1.01s cubic-bezier(0.45, 0.05, 0.15, 0.95);
      will-change: transform;
    }

    /* Click / keyboard toggle */
    .card-scene.is-flipped .card-inner {
      transform: rotateY(180deg);
    }

    /* ============================================================
       CARD FACES
    ============================================================ */
    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;

      background-color: #EDE8DE;
      border-radius: 2px;

      display: flex;
      flex-direction: column;
      justify-content: space-between;

      /* Percentage padding scales naturally with card width */
      padding: 5.6% 6.8% 5.0% 6.8%;

      box-shadow:
        0 1px 2px  rgba(0, 0, 0, 0.55),
        0 4px 12px rgba(0, 0, 0, 0.48),
        0 14px 32px rgba(0, 0, 0, 0.40),
        0 32px 72px rgba(0, 0, 0, 0.30),
        inset 0 0 0 0.5px rgba(255, 252, 240, 0.18);

      color: #1C1A17;

      /* Base font scales proportionally with card width */
      font-size: clamp(9.5px, calc(min(520px, 88vw) / 38.5), 13.5px);
    }

    /* Back face starts pre-rotated */
    .card-back {
      transform: rotateY(180deg);
    }

    /* ============================================================
       FRONT — TOP
    ============================================================ */
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .card-top-left {
      display: flex;
      align-items: flex-start;
    }

    .card-top-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .card-email {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.749em;
      letter-spacing: 0.04em;
      color: #46413B;
      text-decoration: none;
      line-height: 1;
      transition: color 0.2s ease;
    }

    .card-email:hover { color: #1C1A17; }

    .card-icons {
      display: flex;
      align-items: center;
      gap: 0.58em;
    }

    .card-icons a {
      display: flex;
      align-items: center;
      color: #5C5650;
      text-decoration: none;
      line-height: 0;
      transition: color 0.2s ease;
    }

    .card-icons a:hover { color: #1C1A17; }

    .card-icons svg {
      width: 0.914em;
      height: 0.914em;
    }

    /* ============================================================
       FRONT — CENTER
    ============================================================ */
    .card-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0.42em;
      /* Slight upward optical bias — mirrors Bateman card proportions */
      margin-bottom: 1.5%;
    }

    .card-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-size: 1.58em;
      letter-spacing: 0.17em;
      text-transform: uppercase;
      color: #1C1A17;
      line-height: 1;
    }

    /* Surname heavier — mirrors "Patrick BATEMAN" hierarchy */
    .card-name .surname {
      font-weight: 600;
    }

    .card-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-size: 0.71em;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #3A3530;
      line-height: 1;
    }

    /* ============================================================
       FRONT — BOTTOM
    ============================================================ */
    .card-bottom {
      text-align: center;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.644em;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #6A6560;
      line-height: 1;
    }

    /* ============================================================
       BACK — SEE MORE BUTTON
    ============================================================ */
    .card-back-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    .see-more-btn {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: 1.1em;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #3A3530;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.4em 0.8em;
      transition: color 0.2s ease;
    }

    .see-more-btn:hover { color: #1C1A17; }

    /* ============================================================
       POPUP OVERLAY
    ============================================================ */
    .popup-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .popup-overlay.is-open {
      pointer-events: all;
      opacity: 1;
    }

    .popup-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15, 14, 12, 0.72);
    }

    /* Mini business cards — positions set by JS */
    .popup-card {
      position: fixed;
      width: min(200px, 38vw);
      aspect-ratio: 1.75;
      background-color: #EDE8DE;
      border-radius: 2px;
      box-shadow:
        0 1px 2px  rgba(0, 0, 0, 0.55),
        0 4px 12px rgba(0, 0, 0, 0.48),
        0 14px 32px rgba(0, 0, 0, 0.40),
        inset 0 0 0 0.5px rgba(255, 252, 240, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      cursor: grab;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: clamp(8px, 2.2vw, 12px);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #3A3530;
      opacity: 0;
      transform: rotate(var(--rot, 0deg)) scale(0.5);
      transition:
        opacity 0.4s ease,
        transform 0.5s cubic-bezier(0.16, 1, 0.3, 1),
        box-shadow 0.2s ease,
        color 0.2s ease;
      transition-delay: var(--delay, 0s);
      user-select: none;
      -webkit-user-select: none;
      z-index: 101;
      touch-action: none;
    }

    /* Float keyframe — gentle drift + wobble */
    @keyframes popupFloat {
      0%, 100% { transform: rotate(var(--rot, 0deg)) scale(1) translateY(0); }
      50%       { transform: rotate(calc(var(--rot, 0deg) + var(--float-tilt, 1deg))) scale(1) translateY(var(--float-y, -6px)); }
    }

    /* Per-card float timing — each card gets its own rhythm */
    .popup-card[data-idx="0"] { --float-dur: 5.0s; --float-delay:  0.0s; --float-y: -7px;  --float-tilt:  1.2deg; }
    .popup-card[data-idx="1"] { --float-dur: 4.2s; --float-delay: -1.5s; --float-y: -5px;  --float-tilt: -1.0deg; }
    .popup-card[data-idx="2"] { --float-dur: 6.1s; --float-delay: -3.0s; --float-y: -8px;  --float-tilt:  0.8deg; }
    .popup-card[data-idx="3"] { --float-dur: 4.8s; --float-delay: -2.2s; --float-y: -6px;  --float-tilt: -1.5deg; }
    .popup-card[data-idx="4"] { --float-dur: 5.5s; --float-delay: -0.8s; --float-y: -9px;  --float-tilt:  1.8deg; }

    .popup-overlay.is-open .popup-card {
      opacity: 1;
      transform: rotate(var(--rot, 0deg)) scale(1);
      animation: popupFloat var(--float-dur, 5s) ease-in-out var(--float-delay, 0s) infinite;
    }

    .popup-card:hover { color: #1C1A17; }

    .popup-card.is-dragging {
      cursor: grabbing !important;
      animation: none !important;
      transition: box-shadow 0.15s ease, color 0.2s ease !important;
      box-shadow:
        0 4px 8px  rgba(0, 0, 0, 0.60),
        0 12px 32px rgba(0, 0, 0, 0.52),
        0 28px 64px rgba(0, 0, 0, 0.44),
        inset 0 0 0 0.5px rgba(255, 252, 240, 0.18);
      transform: rotate(var(--rot, 0deg)) scale(1.06) !important;
      z-index: 115;
    }

    /* ============================================================
       INTERACTION HINT
    ============================================================ */
    .card-hint {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 10px;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: rgba(237, 232, 222, 0.17);
      user-select: none;
      pointer-events: none;
      transition: opacity 0.55s ease;
    }

    .card-hint.is-gone { opacity: 0; }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 480px) {
      body {
        overflow: auto;
        align-items: flex-start;
      }

      .scene {
        min-height: 100dvh;
        justify-content: center;
        padding: 2.5rem 0;
      }
    }

    /* ============================================================
       REDUCED MOTION
    ============================================================ */
    @media (prefers-reduced-motion: reduce) {
      .card-inner    { transition: none; }
      .scene         { animation: none; }
      .popup-card    { transition: none; animation: none !important; }
      .popup-overlay { transition: none; }
    }

  </style>
</head>
<body>

  <main class="scene">

    <div
      class="card-scene"
      id="cardScene"
      role="button"
      aria-label="Business card. Activate to reveal navigation."
      tabindex="0"
    >
      <div class="card-inner">

        <!-- ===== FRONT ===== -->
        <article class="card-face card-front">

          <div class="card-top">
            <div class="card-top-left">
              <a class="card-email" href="mailto:work@henrybpan.com">
                work@henrybpan.com
              </a>
            </div>

            <div class="card-top-right">
              <div class="card-icons">

                <!-- Instagram -->
                <a href="https://www.instagram.com/henrybpan" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.65" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                    <circle cx="12" cy="12" r="4.2"/>
                    <circle cx="17.5" cy="6.5" r="0.85" fill="currentColor" stroke="none"/>
                  </svg>
                </a>

                <!-- YouTube -->
                <a href="https://www.youtube.com/@henrybpan" target="_blank" rel="noopener noreferrer" aria-label="YouTube">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.65" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46a2.78 2.78 0 0 0-1.95 1.96A29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58A2.78 2.78 0 0 0 3.41 19.6C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.95A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/>
                    <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="currentColor" stroke="none"/>
                  </svg>
                </a>

                <!-- X -->
                <a href="https://x.com/henrypanonx" target="_blank" rel="noopener noreferrer" aria-label="X (formerly Twitter)">
                  <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                  </svg>
                </a>

              </div>
            </div>
          </div>

          <div class="card-center">
            <h1 class="card-name">Henry <span class="surname">Pan</span></h1>
            <p class="card-title">Social Media Growth</p>
          </div>

          <p class="card-bottom">
            NoVA&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;University&nbsp;of&nbsp;Virginia
          </p>

        </article>

        <!-- ===== BACK ===== -->
        <article class="card-face card-back">
          <div class="card-back-inner">
            <button class="see-more-btn" id="seeMoreBtn" aria-label="See navigation options">
              see more
            </button>
          </div>
        </article>

      </div>
    </div>

    <p class="card-hint" id="cardHint">
      tap to explore
    </p>

  </main>

  <!-- Popup overlay — mini business card navigation -->
  <div class="popup-overlay" id="popupOverlay" aria-hidden="true">
    <div class="popup-backdrop" id="popupBackdrop"></div>
    <a href="/about"               class="popup-card" data-idx="0">About</a>
    <a href="/essays"              class="popup-card" data-idx="1">Essays</a>
    <a href="/recommendations"     class="popup-card" data-idx="2">Recommendations</a>
    <a href="/work-with-me"        class="popup-card" data-idx="3">Work with Me</a>
    <a href="/testimonies-results" class="popup-card" data-idx="4">Results</a>
  </div>

  <script>
    (function () {
      'use strict';

      var scene         = document.getElementById('cardScene');
      var hint          = document.getElementById('cardHint');
      var seeMoreBtn    = document.getElementById('seeMoreBtn');
      var popupOverlay  = document.getElementById('popupOverlay');
      var popupBackdrop = document.getElementById('popupBackdrop');
      var popupCards    = Array.prototype.slice.call(document.querySelectorAll('.popup-card'));
      var revealed      = false;

      /* ---- Hint ---- */
      function dismissHint() {
        if (!revealed) { revealed = true; hint.classList.add('is-gone'); }
      }

      /* ---- Card flip ---- */
      scene.addEventListener('click', function (e) {
        if (e.target.closest('a'))             return;
        if (e.target.closest('.see-more-btn')) return;
        scene.classList.toggle('is-flipped');
        dismissHint();
      });

      scene.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          scene.classList.toggle('is-flipped');
          dismissHint();
        }
      });

      /* ---- Mind-map scatter placements ----
         dx/dy = fraction of viewport offset from center (card-center to screen-center)
         rot   = tilt in degrees
         delay = stagger for entry animation                                         */
      var placements = [
        { dx: -0.40, dy: -0.34, rot:  -8, delay: '0.04s' }, // About           — top-left, steep tilt
        { dx:  0.14, dy: -0.44, rot:  10, delay: '0.09s' }, // Essays          — top-right, high & tilted
        { dx:  0.42, dy: -0.10, rot:  -5, delay: '0.14s' }, // Recommendations — far right, slight lean
        { dx: -0.32, dy:  0.34, rot:   9, delay: '0.19s' }, // Work with Me    — bottom-left, warm tilt
        { dx:  0.22, dy:  0.40, rot: -12, delay: '0.24s' }, // Results         — bottom-right, dramatic lean
      ];

      /* Compute home position (px) for a card given its index */
      function homePos(idx) {
        var vw = window.innerWidth;
        var vh = window.innerHeight;
        var p  = placements[idx];
        var cardW = Math.min(200, vw * 0.38);
        var cardH = cardW / 1.75;
        var left = Math.max(8, Math.min(vw - cardW - 8,
          vw / 2 + p.dx * vw - cardW / 2));
        var top  = Math.max(8, Math.min(vh - cardH - 8,
          vh / 2 + p.dy * vh - cardH / 2));
        return { left: left, top: top };
      }

      /* Place cards at their home positions without animation */
      function resetCardPositions() {
        popupCards.forEach(function (card, i) {
          var pos = homePos(i);
          card.style.left = pos.left + 'px';
          card.style.top  = pos.top  + 'px';
          card.style.setProperty('--rot',   placements[i].rot   + 'deg');
          card.style.setProperty('--delay', placements[i].delay);
        });
      }

      /* ---- Popup open / close ---- */
      function openPopup() {
        resetCardPositions();
        popupOverlay.classList.add('is-open');
        popupOverlay.setAttribute('aria-hidden', 'false');
      }

      function closePopup() {
        popupOverlay.classList.remove('is-open');
        popupOverlay.setAttribute('aria-hidden', 'true');
      }

      seeMoreBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        dismissHint();
        openPopup();
      });

      popupBackdrop.addEventListener('click', closePopup);

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closePopup();
      });

      /* ---- Draggable cards ---- */
      popupCards.forEach(function (card) {
        var startPX, startPY, startLeft, startTop, dragging, hasMoved;

        card.addEventListener('pointerdown', function (e) {
          /* Only primary pointer / left button */
          if (e.button && e.button !== 0) return;
          dragging  = true;
          hasMoved  = false;
          startPX   = e.clientX;
          startPY   = e.clientY;
          startLeft = parseFloat(card.style.left) || 0;
          startTop  = parseFloat(card.style.top)  || 0;
          card.setPointerCapture(e.pointerId);
          card.classList.add('is-dragging');
        });

        card.addEventListener('pointermove', function (e) {
          if (!dragging) return;
          var dx = e.clientX - startPX;
          var dy = e.clientY - startPY;
          if (Math.abs(dx) > 4 || Math.abs(dy) > 4) hasMoved = true;
          var vw = window.innerWidth;
          var vh = window.innerHeight;
          var cardW = card.offsetWidth;
          var cardH = card.offsetHeight;
          card.style.left = Math.max(0, Math.min(vw - cardW, startLeft + dx)) + 'px';
          card.style.top  = Math.max(0, Math.min(vh - cardH, startTop  + dy)) + 'px';
        });

        card.addEventListener('pointerup', function (e) {
          dragging = false;
          card.classList.remove('is-dragging');
          card.releasePointerCapture(e.pointerId);
        });

        /* Block navigation if the card was dragged */
        card.addEventListener('click', function (e) {
          if (hasMoved) {
            e.preventDefault();
            hasMoved = false;
          }
        });
      });

      /* Re-home cards if viewport resizes while popup is closed */
      window.addEventListener('resize', function () {
        if (!popupOverlay.classList.contains('is-open')) return;
        resetCardPositions();
      });

    }());
  </script>

</body>
</html>
