<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Henry Pan — Social Media Growth">
  <title>Henry Pan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>

    /* ============================================================
       RESET
    ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ============================================================
       BASE
    ============================================================ */
    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background-color: #0F0E0C;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Cinematic vignette — draws focus to the card */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(
        ellipse 75% 75% at 50% 50%,
        transparent 30%,
        rgba(0, 0, 0, 0.5) 100%
      );
      pointer-events: none;
      z-index: 0;
    }

    /* ============================================================
       SCENE
    ============================================================ */
    .scene {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      animation: sceneEntry 1.1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes sceneEntry {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* ============================================================
       CARD SCENE  (perspective wrapper + tap target)
    ============================================================ */
    .card-scene {
      width: min(520px, 88vw);
      aspect-ratio: 1.75;
      perspective: 1400px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    .card-scene:focus-visible {
      outline: 1.5px solid rgba(237, 232, 222, 0.22);
      outline-offset: 10px;
      border-radius: 3px;
    }

    /* ============================================================
       CARD INNER  (3D flip container)
    ============================================================ */
    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.78s cubic-bezier(0.45, 0.05, 0.15, 0.95);
      will-change: transform;
    }

    /* Desktop hover — CSS-only, no JS */
    @media (hover: hover) and (pointer: fine) {
      .card-scene:hover .card-inner {
        transform: rotateY(180deg);
      }
    }

    /* Mobile tap / keyboard toggle */
    .card-scene.is-flipped .card-inner {
      transform: rotateY(180deg);
    }

    /* ============================================================
       CARD FACES
    ============================================================ */
    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;

      background-color: #EDE8DE;
      border-radius: 2px;

      display: flex;
      flex-direction: column;
      justify-content: space-between;

      /* Percentage padding scales naturally with card width */
      padding: 5.6% 6.8% 5.0% 6.8%;

      box-shadow:
        0 1px 2px  rgba(0, 0, 0, 0.55),
        0 4px 12px rgba(0, 0, 0, 0.48),
        0 14px 32px rgba(0, 0, 0, 0.40),
        0 32px 72px rgba(0, 0, 0, 0.30),
        inset 0 0 0 0.5px rgba(255, 252, 240, 0.18);

      color: #1C1A17;

      /* Base font scales proportionally with card width */
      font-size: clamp(9.5px, calc(min(520px, 88vw) / 38.5), 13.5px);
    }

    /* Back face starts pre-rotated */
    .card-back {
      transform: rotateY(180deg);
    }

    /* ============================================================
       FRONT — TOP
    ============================================================ */
    .card-top {
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
    }

    .card-top-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.5em;
    }

    .card-email {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.62em;
      letter-spacing: 0.04em;
      color: #46413B;
      text-decoration: none;
      line-height: 1;
      transition: color 0.2s ease;
    }

    .card-email:hover { color: #1C1A17; }

    .card-icons {
      display: flex;
      align-items: center;
      gap: 0.58em;
    }

    .card-icons a {
      display: flex;
      align-items: center;
      color: #5C5650;
      text-decoration: none;
      line-height: 0;
      transition: color 0.2s ease;
    }

    .card-icons a:hover { color: #1C1A17; }

    .card-icons svg {
      width: 0.72em;
      height: 0.72em;
    }

    /* ============================================================
       FRONT — CENTER
    ============================================================ */
    .card-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0.42em;
      /* Slight upward optical bias — mirrors Bateman card proportions */
      margin-bottom: 1.5%;
    }

    .card-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-size: 1.58em;
      letter-spacing: 0.17em;
      text-transform: uppercase;
      color: #1C1A17;
      line-height: 1;
    }

    /* Surname heavier — mirrors "Patrick BATEMAN" hierarchy */
    .card-name .surname {
      font-weight: 600;
    }

    .card-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-size: 0.71em;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #3A3530;
      line-height: 1;
    }

    /* ============================================================
       FRONT — BOTTOM
    ============================================================ */
    .card-bottom {
      text-align: center;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.56em;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #6A6560;
      line-height: 1;
    }

    /* ============================================================
       BACK — NAVIGATION
    ============================================================ */
    .card-nav {
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100%;
    }

    .card-nav a {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: 1.26em;
      letter-spacing: 0.07em;
      color: #3A3530;
      text-decoration: none;
      display: block;
      padding: 0.3em 0;
      border-bottom: 0.5px solid rgba(26, 23, 20, 0.1);
      line-height: 1.15;
      transition: color 0.2s ease, padding-left 0.22s ease;
    }

    .card-nav a:first-child {
      border-top: 0.5px solid rgba(26, 23, 20, 0.1);
    }

    .card-nav a:hover {
      color: #1C1A17;
      padding-left: 0.28em;
    }

    /* ============================================================
       INTERACTION HINT
    ============================================================ */
    .card-hint {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 10px;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: rgba(237, 232, 222, 0.17);
      user-select: none;
      pointer-events: none;
      transition: opacity 0.55s ease;
    }

    .card-hint.is-gone { opacity: 0; }

    /* Show correct hint by device capability */
    .hint-desktop { display: none; }
    .hint-mobile  { display: none; }

    @media (hover: hover) and (pointer: fine) {
      .hint-desktop { display: inline; }
    }

    @media (hover: none) {
      .hint-mobile { display: inline; }
    }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 480px) {
      body {
        overflow: auto;
        align-items: flex-start;
      }

      .scene {
        min-height: 100dvh;
        justify-content: center;
        padding: 2.5rem 0;
      }
    }

    /* ============================================================
       REDUCED MOTION
    ============================================================ */
    @media (prefers-reduced-motion: reduce) {
      .card-inner { transition: none; }
      .scene      { animation: none; }
    }

  </style>
</head>
<body>

  <main class="scene">

    <div
      class="card-scene"
      id="cardScene"
      role="button"
      aria-label="Business card. Activate to reveal navigation."
      tabindex="0"
    >
      <div class="card-inner">

        <!-- ===== FRONT ===== -->
        <article class="card-face card-front">

          <div class="card-top">
            <div class="card-top-right">

              <a class="card-email" href="mailto:work@henrybpan.com">
                work@henrybpan.com
              </a>

              <div class="card-icons">

                <!-- Instagram -->
                <a href="https://www.instagram.com/henrybpan" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.65" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                    <circle cx="12" cy="12" r="4.2"/>
                    <circle cx="17.5" cy="6.5" r="0.85" fill="currentColor" stroke="none"/>
                  </svg>
                </a>

                <!-- YouTube -->
                <a href="https://www.youtube.com/@henrybpan" target="_blank" rel="noopener noreferrer" aria-label="YouTube">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.65" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46a2.78 2.78 0 0 0-1.95 1.96A29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58A2.78 2.78 0 0 0 3.41 19.6C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.95A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/>
                    <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="currentColor" stroke="none"/>
                  </svg>
                </a>

                <!-- X -->
                <a href="https://x.com/henrybpan" target="_blank" rel="noopener noreferrer" aria-label="X (formerly Twitter)">
                  <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                  </svg>
                </a>

              </div>
            </div>
          </div>

          <div class="card-center">
            <h1 class="card-name">Henry <span class="surname">Pan</span></h1>
            <p class="card-title">Social Media Growth</p>
          </div>

          <p class="card-bottom">
            NoVA&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;University&nbsp;of&nbsp;Virginia
          </p>

        </article>

        <!-- ===== BACK ===== -->
        <article class="card-face card-back">
          <nav class="card-nav" aria-label="Site navigation">
            <a href="/about">About</a>
            <a href="/essays">Essays</a>
            <a href="/recommendations">Recommendations</a>
            <a href="/work-with-me">Work with Me</a>
          </nav>
        </article>

      </div>
    </div>

    <p class="card-hint" id="cardHint">
      <span class="hint-desktop">hover to explore</span>
      <span class="hint-mobile">tap to explore</span>
    </p>

  </main>

  <script>
    (function () {
      'use strict';

      var scene    = document.getElementById('cardScene');
      var hint     = document.getElementById('cardHint');
      var revealed = false;

      function isHoverDevice() {
        return window.matchMedia('(hover: hover) and (pointer: fine)').matches;
      }

      function dismissHint() {
        if (!revealed) {
          revealed = true;
          hint.classList.add('is-gone');
        }
      }

      /* Mobile tap: toggle flip.
         On hover-capable devices CSS :hover handles it.
         Guard: nav link taps navigate, they don't toggle the card. */
      scene.addEventListener('click', function (e) {
        if (isHoverDevice()) return;
        if (e.target.closest('a')) return;
        scene.classList.toggle('is-flipped');
        dismissHint();
      });

      /* Keyboard: Enter / Space */
      scene.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          scene.classList.toggle('is-flipped');
          dismissHint();
        }
      });

      /* Desktop: dismiss hint on first hover */
      scene.addEventListener('mouseenter', function () {
        if (isHoverDevice()) dismissHint();
      }, { once: true });

    }());
  </script>

</body>
</html>
