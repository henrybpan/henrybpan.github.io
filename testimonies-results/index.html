<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/favicon.png">

  <title>Testimonies &amp; Results — Henry Pan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=EB+Garamond:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    body {
      background-color: #0F0E0C;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .page {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: clamp(2.5rem, 8vw, 4.5rem) clamp(2rem, 10vw, 5rem);
      animation: up 0.75s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .back {
      display: inline-block;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(237, 232, 222, 0.48);
      text-decoration: none;
      margin-bottom: clamp(3rem, 8vh, 5rem);
      transition: color 0.2s ease;
    }
    .back:hover { color: rgba(237, 232, 222, 0.78); }

    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: clamp(2.2rem, 7vw, 3.5rem);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(237, 232, 222, 0.75);
      line-height: 1;
      margin-bottom: clamp(3rem, 8vh, 5rem);
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: clamp(1.25rem, 3vw, 2rem);
    }
    @media (max-width: 680px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* ── Card ── */
    .card {
      background: rgba(237, 232, 222, 0.03);
      box-shadow: inset 0 0 0 0.5px rgba(255, 252, 240, 0.07);
      border-radius: 2px;
      padding: clamp(1.25rem, 3vw, 1.75rem);
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }

    /* ── Card header ── */
    .card-header {
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }

    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      box-shadow: inset 0 0 0 1px rgba(237, 232, 222, 0.1);
    }

    .avatar-initials {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(237, 232, 222, 0.07);
      box-shadow: inset 0 0 0 1px rgba(237, 232, 222, 0.1);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      color: rgba(237, 232, 222, 0.38);
      user-select: none;
    }

    .card-identity {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .card-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      letter-spacing: 0.08em;
      color: rgba(237, 232, 222, 0.55);
      text-decoration: none;
      transition: color 0.18s ease;
    }
    .card-name:hover { color: rgba(237, 232, 222, 0.85); }

    /* ── Social badges ── */
    .badges {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      flex-wrap: wrap;
    }

    .badge {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(237, 232, 222, 0.55);
      text-decoration: none;
      transition: color 0.18s ease;
    }
    .badge:hover { color: rgba(237, 232, 222, 0.82); }

    .badge svg {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
      opacity: 0.7;
    }

    /* ── Video ── */
    .card-video {
      width: 100%;
      border-radius: 2px;
      display: block;
      background: #000;
      max-height: 420px;
      object-fit: cover;
    }

    /* ── No-video placeholder ── */
    .no-video {
      height: 2rem;
    }

    @media (prefers-reduced-motion: reduce) { .page { animation: none; } }
  </style>
</head>
