    .page-head h1 {

    .direct-block {
      text-align: center;

    .direct-label {

      font-size: 0.66rem;

      color: var(--ink-dim);
      margin-bottom: 1.1rem;

    .direct-links a {

      transition: color 0.25s ease, transform 0.2s ease;
    }
    .direct-links a:hover { color: var(--ember); transform: translateY(-1px); }
    .direct-links svg { width: 22px; height: 22px; display: block; }

    form { margin: 0; }
    .field { margin-bottom: 1.4rem; }
    label {
      display: block;
      font-family: var(--font-caps);
      font-size: 0.66rem;
      letter-spacing: 0.28em;
      text-indent: 0.28em;
      color: var(--ink-dim);
      margin-bottom: 0.5rem;
      font-weight: 600;
    }
    input[type="text"], input[type="email"], select, textarea {
      width: 100%;
      padding: 0.8rem 0.95rem;
      font-family: var(--font-body);
      font-size: 1.05rem;
      line-height: 1.5;
      border: 1px solid var(--ink);
      background: var(--paper);
      color: var(--ink);
      border-radius: 0;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      box-shadow: 0 0 0 2px var(--ember);
    }
    select {
      appearance: none; -webkit-appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, var(--ink-mut) 50%),
                        linear-gradient(135deg, var(--ink-mut) 50%, transparent 50%);
      background-position: calc(100% - 18px) 50%, calc(100% - 12px) 50%;
      background-size: 6px 6px;
      background-repeat: no-repeat;
      padding-right: 2rem;
    }
    textarea { resize: vertical; min-height: 7.5rem; }
    button {
      width: 100%;
      padding: 0.95rem 1rem;
      background: var(--ink);
      color: var(--paper);
      border: 1px solid var(--ink);
      font-family: var(--font-caps);
      font-size: 0.72rem;
      letter-spacing: 0.32em;
      text-indent: 0.32em;
      text-transform: uppercase;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s ease, transform 0.15s ease;
      margin-top: 0.4rem;
    }
    button:hover { opacity: 0.88; transform: translateY(-1px); }
    .status {
      margin-top: 1rem;
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1rem;
      color: var(--ink-mut);
      min-height: 1.4em;

    .status.ok { color: var(--ink); }
    .status.err { color: #b94848; }

      <form id="contact-form" action="https://formspree.io/f/xqewvkjk" method="POST">
        <div class="field"><label for="name">YOUR NAME</label><input type="text" id="name" name="name" required autocomplete="name"></div>
        <div class="field"><label for="email">YOUR EMAIL</label><input type="email" id="email" name="email" required autocomplete="email"></div>
        <div class="field">
          <label for="subject">WHAT'S THIS ABOUT?</label>

  <script>
    (function () {
      var form = document.getElementById('contact-form');
      var status = document.getElementById('status');
      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        status.className = 'status'; status.textContent = 'Sending…';
        try {
          var res = await fetch(form.action, { method: 'POST', body: new FormData(form), headers: { Accept: 'application/json' } });
          if (res.ok) { form.reset(); status.className = 'status ok'; status.textContent = 'Sent. I’ll get back to you soon.'; }
          else { var data = await res.json().catch(function () { return {}; }); status.className = 'status err'; status.textContent = (data && data.error) || 'Something went wrong. Try emailing me directly.'; }
        } catch (err) { status.className = 'status err'; status.textContent = 'Network error. Try emailing me directly.'; }
      });
    }());
  </script>
